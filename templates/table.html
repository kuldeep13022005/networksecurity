<!DOCTYPE html>
<html>
<head>
    <title>Network Security — Predictions</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; background: #f5f5f5; }
        h2 { color: #333; }
        table { border-collapse: collapse; width: 100%; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #4a4a8a; color: white; padding: 10px 14px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 10px 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0f0ff; }
    </style>
</head>
<body>
    <h2>Prediction Results</h2>
    <p>Values in <strong>predicted_column</strong>: <code>1</code> = safe, <code>-1</code> = phishing</p>
    {{ table | safe }}
</body>
</html>
